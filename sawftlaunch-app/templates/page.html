<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ identity.name }} — SawftLaunch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="{{ identity.fonts.google_fonts_url }}" rel="stylesheet" />
  <style>
    :root {
      --bg: {{ identity.palette.bg }};
      --ink: {{ identity.palette.ink }};
      --accent: {{ identity.palette.accent }};
      --accent2: {{ identity.palette.accent2 }};
      --soft: {{ identity.palette.soft }};
      --display: "{{ identity.fonts.display }}", serif;
      --body: "{{ identity.fonts.body }}", sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    /* The aesthetic effect lives behind the content */
    .fx { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .stage {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 8vmin;
      max-width: 900px;
    }
    .eyebrow {
      font-family: var(--body);
      letter-spacing: 0.42em;
      text-transform: uppercase;
      font-size: clamp(0.6rem, 1.4vw, 0.8rem);
      color: var(--accent);
      margin-bottom: 2.2rem;
      font-weight: 600;
    }
    .name {
      font-family: var(--display);
      font-weight: 700;
      line-height: 0.98;
      font-size: clamp(2.8rem, 11vw, 8rem);
      letter-spacing: -0.01em;
    }
    .tagline {
      margin-top: 1.8rem;
      font-size: clamp(1rem, 2.4vw, 1.5rem);
      color: var(--ink);
      opacity: 0.86;
      max-width: 36ch;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.45;
    }
    .swatches { margin-top: 3rem; display: flex; gap: 0.6rem; justify-content: center; }
    .swatch { width: 34px; height: 34px; border-radius: 50%; box-shadow: 0 0 0 1px rgba(255,255,255,0.12); }
    .footer {
      position: fixed; bottom: 1.4rem; left: 0; right: 0; z-index: 2;
      text-align: center; font-family: var(--body);
      font-size: 0.7rem; letter-spacing: 0.28em; text-transform: uppercase;
      opacity: 0.5;
    }

    /* ---------- EFFECT: sigil-lines (Cybersigilism) ---------- */
    .fx-sigil-lines {
      background:
        radial-gradient(circle at 50% 40%, color-mix(in srgb, var(--accent2) 22%, transparent), transparent 60%),
        repeating-linear-gradient(115deg, transparent 0 26px, color-mix(in srgb, var(--accent) 10%, transparent) 26px 27px),
        repeating-linear-gradient(65deg, transparent 0 22px, color-mix(in srgb, var(--ink) 5%, transparent) 22px 23px);
    }
    .fx-sigil-lines::after {
      content: ""; position: absolute; inset: -20%;
      background: radial-gradient(circle, transparent 60%, var(--bg) 100%);
    }

    /* ---------- EFFECT: tapa-pattern (Pasifika) ---------- */
    .fx-tapa-pattern {
      background:
        repeating-linear-gradient(45deg, color-mix(in srgb, var(--accent) 14%, transparent) 0 10px, transparent 10px 20px),
        repeating-linear-gradient(-45deg, color-mix(in srgb, var(--accent2) 14%, transparent) 0 10px, transparent 10px 20px);
      background-size: 56px 56px;
      opacity: 0.9;
    }
    .fx-tapa-pattern::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 35%, var(--bg) 92%);
    }

    /* ---------- EFFECT: neon-grid (Vaporwave) ---------- */
    .fx-neon-grid { background: linear-gradient(180deg, var(--soft) 0%, var(--bg) 60%); }
    .fx-neon-grid::before {
      content: ""; position: absolute; left: -50%; right: -50%; bottom: -10%; height: 70%;
      background-image:
        linear-gradient(color-mix(in srgb, var(--accent2) 60%, transparent) 1px, transparent 1px),
        linear-gradient(90deg, color-mix(in srgb, var(--accent2) 60%, transparent) 1px, transparent 1px);
      background-size: 44px 44px;
      transform: perspective(340px) rotateX(62deg);
      transform-origin: bottom;
      mask-image: linear-gradient(180deg, transparent, #000 70%);
    }
    .fx-neon-grid::after {
      content: ""; position: absolute; top: 12%; left: 50%; width: 320px; height: 320px;
      transform: translateX(-50%);
      background: radial-gradient(circle, var(--accent) 0%, color-mix(in srgb, var(--accent) 40%, transparent) 40%, transparent 70%);
      border-radius: 50%; filter: blur(6px); opacity: 0.85;
    }

    /* ---------- EFFECT: fine-rules (Editorial Luxe) ---------- */
    .fx-fine-rules::before,
    .fx-fine-rules::after {
      content: ""; position: absolute; left: 7vmin; right: 7vmin; height: 1px;
      background: color-mix(in srgb, var(--ink) 30%, transparent);
    }
    .fx-fine-rules::before { top: 7vmin; }
    .fx-fine-rules::after { bottom: 7vmin; }
  </style>
</head>
<body>
  <div class="fx fx-{{ identity.effect }}"></div>
  <main class="stage">
    <div class="eyebrow">{{ identity.eyebrow }}</div>
    <h1 class="name">{{ identity.name }}</h1>
    <p class="tagline">{{ identity.tagline }}</p>
    <div class="swatches">
      <span class="swatch" style="background: var(--accent)"></span>
      <span class="swatch" style="background: var(--accent2)"></span>
      <span class="swatch" style="background: var(--soft)"></span>
      <span class="swatch" style="background: var(--ink)"></span>
    </div>
  </main>
  <div class="footer">sawft launched with SawftLaunch</div>
</body>
</html>
